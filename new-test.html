<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="style-new.css">
    <title>SAVE ME - someoneyouknew</title>
</head>
<body>
    <video autoplay muted loop playsinline class="bg-video">
        <source src="BG/save-me-bg.mp4" type="video/mp4">
    </video>
    
    <header class="main-header">
        <a href="index.html"><h1>KULTURAONE</h1></a>
    </header>
    
    <main class="song-content">
        <div class="info-box">
            <div class="layout-wrapper">
                <div class="art-column">
                    <img src="JPG/save-me.jpg" class="main-art" alt="Save Me Cover Art">
                </div>

                <div class="info-column">
                    <h1 class="song-title">SAVE ME</h1>
                    <p class="artist">someoneyouknew</p>
                    
                    <audio id="audioTrack" src="MP3/save-me.mp3"></audio>
                    
                    <div class="custom-audio-player" onclick="togglePlay()">
                        <div class="progress-container" id="progressContainer">
                            <div id="progressBar" class="progress-bar">
                                <div class="progress-dot"></div>
                            </div>
                        </div>
                        <div id="playBtn" class="play-btn">▶</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="streaming-icons">
            <a href="https://open.spotify.com/track/5xrZtk5SBt27z69R5mpHd9">SPOTIFY</a>
            <a href="https://music.apple.com/ph/song/save-me/1793991496">APPLE MUSIC</a>
            <a href="https://www.youtube.com/watch?v=bwRqmmcflz8" target="_blank">YOUTUBE</a>
        </div>

        <details>
            <summary>Credits</summary>
            <div class="content-box">
                Written by Owen Shaddick<br>
                Produced by someoneyouknew<br>
                Released March 3 2025<br>
                ℗ © 2025 SYK MUSIC
            </div>
        </details>

        <details>
            <summary>Lyrics</summary>
            <div class="content-box">
                [Lyrics go here]
            </div>
        </details>

        <footer class="site-footer">
            ℗ © 2026 SYK MUSIC
        </footer>
    </main>

    <script>
        const audio = document.getElementById('audioTrack');
        const playBtn = document.getElementById('playBtn');
        const progressBar = document.getElementById('progressBar');
        const progressContainer = document.getElementById('progressContainer');

        function togglePlay() {
            if (audio.paused) {
                audio.play();
                playBtn.innerHTML = '❚❚';
            } else {
                audio.pause();
                playBtn.innerHTML = '▶';
            }
        }

        audio.addEventListener('timeupdate', () => {
            if (audio.duration) {
                const progress = (audio.currentTime / audio.duration) * 100;
                progressBar.style.width = progress + '%';
            }
        });

        // Seek functionality
        progressContainer.addEventListener('click', (e) => {
            const width = progressContainer.clientWidth;
            const clickX = e.offsetX;
            const duration = audio.duration;
            audio.currentTime = (clickX / width) * duration;
        });
    </script>
</body>
</html>
