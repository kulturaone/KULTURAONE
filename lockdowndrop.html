<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/jpg" href="icon.jpg">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="style.css">
    <title>LOCKDOWNDROP</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; min-height: 100%; background-color: #000; overflow-x: hidden; box-sizing: border-box; }
        *, *:before, *:after { box-sizing: inherit; }

        .bg-video {
            position: fixed; top: 50%; left: 50%; min-width: 100%; min-height: 100%;
            width: auto; height: auto; z-index: -1; transform: translateX(-50%) translateY(-50%);
            object-fit: cover; opacity: 0.35;
        }

        #comment-container {
            width: 90% !important; max-width: 600px !important; margin: 40px auto !important;
        }
    </style>
</head>
<body>
    
    <div id="passwordGate" style="display:flex; flex-direction:column; align-items:center; justify-content:center; height:100vh; width:100vw; position: relative;">
        <header style="margin-bottom: 60px; text-align: center;">
            <h1 style="margin: 0; font-weight: normal; font-size: 1.4rem; letter-spacing: 4px; color: #fff;">KULTURAONE</h1>
            <p style="font-size: 0.8rem; letter-spacing: 4px; margin: 8px 0 0 0; opacity: 0.6; text-transform: uppercase; color: #fff;">LockdownDrop</p>
        </header>

        <div style="display: flex; flex-direction: column; align-items: center; width: 100%; max-width: 240px;">
            <h1 style="color:#fff; font-size:1.1rem; margin-bottom:25px; letter-spacing:3px; font-family: 'Instrument Serif', serif; font-weight: normal;">ENTER ACCESS KEY</h1>
            <input type="password" id="passInput" style="display:block; margin: 0 0 15px 0; padding:12px; background:transparent; border:1px solid rgba(255,255,255,0.5); color:#fff; text-align:center; width:100%; font-family: 'Instrument Serif', serif; outline: none;">
            <button onclick="checkPass()" style="display:block; margin: 0; padding:12px 20px; background:#fff; border:none; cursor:pointer; font-family: 'Instrument Serif', serif; letter-spacing:2px; text-transform: uppercase; width: 100%; color: #000;">ENTER</button>
        </div>
    </div>

    <main id="mainContent" class="song-content" style="display:none; flex-direction:column; align-items:center; justify-content: flex-start; min-height:100vh; width: 100vw; padding: 60px 20px; position: relative;">
        <header class="main-header" style="margin-bottom: 40px; width: 100%;">
            <a href="index.html" style="display: block; text-align: center; color: #fff; text-decoration: none;">
                <h1 style="margin: 0; font-weight: normal; font-size: 1.4rem; letter-spacing: 4px;">KULTURAONE</h1>
                <p style="font-size: 0.8rem; letter-spacing: 4px; margin: 8px 0 0 0; opacity: 0.6; text-transform: uppercase;">LockdownDrop</p>
            </a>
        </header>

        <div id="timer" style="width: 100%; display: flex; justify-content: center; font-size: 1.1rem; margin-bottom: 40px; letter-spacing: 3px; color: #fff; opacity: 0.8;"></div>

        <div class="song-info" style="text-align: center; margin-bottom: 40px; color: #fff; width: 100%;">
            <h1 class="song-title" style="font-size: 1.6rem; margin: 0 0 8px 0; font-weight: normal; letter-spacing: 2px;">BREAK</h1>
            <p class="artist" style="font-size: 0.95rem; margin: 0; opacity: 0.7; letter-spacing: 1px;">b3aver</p>
        </div>
        
        <audio id="audioTrack" src="MP3/BREAK.wav"></audio>
        
        <div class="custom-audio-player" onclick="togglePlay()" style="margin: 0 auto 40px auto; cursor: pointer; display: flex; align-items: center; width: 100%; max-width: 280px;">
            <div id="playBtn" class="play-btn" style="font-size: 1.2rem; margin-right: 20px; color: #fff; width: 20px; text-align: center;">►</div>
            <div class="progress-container" style="flex-grow: 1; height: 2px; background: rgba(255,255,255,0.2);">
                <div id="progressBar" class="progress-bar" style="width: 0%; height: 100%; background: #fff;"></div>
            </div>
        </div>

        <div id="comment-container">
<script src="https://giscus.app/client.js"
        data-repo="kulturaone/KULTURAONE"
        data-repo-id="R_kgDOTWhrGQ"
        data-category-id="DIC_kwDOTWhrGc4DBEWV"
        data-mapping="pathname"
        data-strict="0"
        data-reactions-enabled="0"
        data-emit-metadata="0"
        data-input-position="top"
        data-theme="dark_high_contrast"
        data-lang="en"
        crossorigin="anonymous"
        async>
</script>
        </div>

        <footer class="site-footer" style="margin-top: auto; padding-top: 50px; text-align: center; color: #fff; font-size: 0.75rem; letter-spacing: 2px; opacity: 0.4;">
            ℗ © 2026 SYK MUSIC
        </footer>
    </main>

    <script>
        const endDate = new Date(2026, 6, 13, 19, 0).getTime(); 

        function checkPass() {
            const pass = document.getElementById('passInput').value;
            const now = new Date().getTime();
            const activePassword = (now >= endDate) ? "nomoremusicforyou333" : "test";

            if (pass === activePassword) {
                document.getElementById('passwordGate').style.display = 'none';
                document.getElementById('mainContent').style.display = 'flex';
            } else {
                alert("Incorrect Key");
            }
        }

        setInterval(() => {
            const now = new Date().getTime();
            const diff = endDate - now;
            if (diff <= 0) {
                document.getElementById('timer').innerHTML = "ACCESS EXPIRED";
            } else {
                const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                const s = Math.floor((diff % (1000 * 60)) / 1000);
                document.getElementById('timer').innerHTML = h + "h " + m + "m " + s + "s";
            }
        }, 1000);

        const audio = document.getElementById('audioTrack');
        const playBtn = document.getElementById('playBtn');
        const progressBar = document.getElementById('progressBar');

        function togglePlay() {
            if (audio.paused) {
                audio.play();
                playBtn.innerHTML = '❚❚';
            } else {
                audio.pause();
                playBtn.innerHTML = '►';
            }
        }

        audio.addEventListener('timeupdate', () => {
            if (audio.duration) {
                const progress = (audio.currentTime / audio.duration) * 100;
                progressBar.style.width = progress + '%';
            }
        });
    </script>
</body>
</html>
